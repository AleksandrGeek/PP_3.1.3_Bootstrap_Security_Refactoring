<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: calc(100vh - 56px);
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
        }

        .sidebar .nav-link {
            color: #333;
            padding: 0.75rem 1rem;
            margin: 0.25rem 0;
            border-radius: 0;
        }

        .main-content {
            padding: 20px;
        }

        .new-user-link {
            color: #007bff;
            text-decoration: none;
            cursor: pointer;
            margin-left: 15px;
            font-size: 1rem;
        }

        .new-user-link:hover {
            text-decoration: underline;
            color: #0056b3;
        }

        .users-table-header {
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body class="bg-light">

<!-- Сообщения об успехе/ошибке - должны быть видимы, поэтому переносим в body -->
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show m-3" role="alert">
    <span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show m-3" role="alert">
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<!-- Верхняя полоска с email и logout -->
<nav class="navbar navbar-expand navbar-light bg-white border-bottom">
    <div class="container-fluid px-4">
        <!-- Email и роль слева с несколькими ролями -->
        <span class="navbar-text">
            <span th:text="${user.email}">admin@mail.ru</span> with roles:
            <span th:each="role : ${user.roles}"
                  th:text="${role.name.replace('ROLE_', '')}"
                  th:unless="${roleStat.last}">ADMIN, </span>
            <span th:each="role : ${user.roles}"
                  th:text="${role.name.replace('ROLE_', '')}"
                  th:if="${roleStat.last}">USER</span>
        </span>

        <!-- Кнопка Logout справа -->
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit" class="btn btn-outline-secondary btn-sm">
                Logout
            </button>
        </form>
    </div>
</nav>

<!-- Основной контент с боковой панелью -->
<div class="container-fluid">
    <div class="row">
        <!-- Боковая панель -->
        <div class="col-md-2 p-0 sidebar">
            <div class="p-0">
                <nav class="nav flex-column">
                    <a class="nav-link"
                       th:classappend="${selectedRole == null || selectedRole == 'ADMIN'} ? 'active' : ''"
                       th:href="@{/admin(role=ADMIN)}">
                        Admin
                    </a>
                    <a class="nav-link"
                       th:classappend="${selectedRole == 'USER'} ? 'active' : ''"
                       th:href="@{/admin(role=USER)}">
                        User
                    </a>
                </nav>
            </div>
        </div>

        <!-- Основной контент -->
        <div class="col-md-10 main-content">
            <!-- Заголовок Admin panel -->
            <h2 class="mb-4">Admin panel</h2>

            <!-- Заголовок User -->
            <div class="mb-3">
                <h6 class="mb-0">
                    Users table
                    <a href="/admin/new" class="new-user-link">New User</a></h6>

            </div>

            <!-- Users Table с ссылкой New User рядом -->
            <div class="users-table-header mb-3">
                <h5 class="mb-0">All Users</h5>
            </div>

            <!-- Таблица -->
            <div class="card shadow">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Edit</th>
                            <th>Delete</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="u : ${users}"
                            th:classappend="${u.roles.contains('ROLE_ADMIN') and
                            (selectedRole == null or selectedRole == 'ADMIN')} ? 'table-highlight-admin' :
                             (${u.roles.contains('ROLE_USER') and selectedRole == 'USER'} ? 'table-highlight-user' : '')">
                            <td th:text="${u.id}">2</td>
                            <td th:text="${u.firstName}">admin</td>
                            <td th:text="${u.lastName}">admin</td>
                            <td th:text="${u.age}">35</td>
                            <td th:text="${u.email}">admin@mail.ru</td>
                            <td>
                                <span th:each="role : ${u.roles}"
                                      th:text="${role.name.replace('ROLE_', '')}"
                                      class="badge bg-secondary me-1">ADMIN</span>
                            </td>
                            <td>
                                <!-- ✅ ИСПРАВЛЕНО: правильно закрыт тег a -->
                                <a th:href="@{/admin/edit(id=${u.id})}"
                                   class="btn btn-info btn-sm">Edit</a>
                            </td>
                            <td>
                                <!-- ✅ ИСПРАВЛЕНО: правильно закрыты атрибуты -->
                                <form th:action="@{/admin/delete(id=${u.id})}"
                                      method="post"
                                      style="display:inline">
                                    <button type="submit" class="btn btn-danger btn-sm"
                                            onclick="return confirm('Delete?')">Delete
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
